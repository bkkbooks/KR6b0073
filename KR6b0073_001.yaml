body:
  text: 東晉天竺三藏竺曇無蘭譯聞如是一時婆伽婆在舍衛城祇樹給孤獨園爾時世尊告諸比丘往昔時有一水饒諸大魚爾時大魚敕小魚曰汝等莫離此間往他處所備為惡人所得爾時小魚不從大魚教便往至他處所爾時魚師以飯網羅線捕諸魚諸小魚見便趣大魚處所爾時大魚見小魚來便問小魚曰汝等莫離此間往至他所爾時小魚便答大魚曰我等向者以至他所來大魚便敕小魚曰汝等至他所不為羅網取捕耶小魚答大魚曰我等至彼不為人所捕然遙見長線尋我後大魚便語小魚曰汝等以為所害所以然者汝所遙見線尋後來者昔先祖父母盡為此線所害汝今必為所害汝非我兒爾時小魚盡為魚師所捕舉著岸上如是小魚大有死者此亦如是或有一比丘在他聚落遊行著衣持鉢周行乞食福度衆生不守護身不守護口意不具足諸根意不專一即於彼村落乞食時見諸女人端正無雙色猶桃華見已便起淫心以此淫心身口意熾然彼以身口意熾然即於村落乞食還所止處故發欲想便往尊比丘所以此因緣具向諸比丘說諸尊大比丘告此比丘言汝起淫想此不為淨汝比丘當惡露觀尊大比丘語復至再三爾時彼比丘身口意熾盛復至彼村落乞食遙見女人端正無比色猶桃華見已便起淫心以此淫心身口意熾然彼以身口意熾然故即於彼村落乞食已還所止處往尊大比丘所以此因緣具向諸比丘說彼尊比丘告此比丘言汝往非我衆中比丘爾時此比丘不捨禁戒便著俗服樂愛欲中是謂比丘魔得其便隨波旬所欲亦不脫生老病死愁憂苦惱如是諸比丘利養具甚為難甚為苦甚為恐畏墮入惡趣不生無上處是故諸比丘當作是學已得利養當捨離之未得利養不起貪意如是諸比丘當作是學爾時諸比丘聞佛所說歡喜奉行
